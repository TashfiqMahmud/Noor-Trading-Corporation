<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-FUR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EAF3FB"/>
      <stop offset="100%" style="stop-color:#F7FBFF"/>
    </linearGradient>
    <pattern id="grid-FUR" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#C8DFF5" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="600" height="480" fill="url(#bg-FUR)"/>
  <rect width="600" height="480" fill="url(#grid-FUR)"/>
  <!-- Corner cross accent -->
  <rect x="22" y="22" width="18" height="6" rx="3" fill="#0E9E8A" opacity="0.6"/>
  <rect x="27" y="17" width="6" height="18" rx="3" fill="#0E9E8A" opacity="0.6"/>
  <!-- Icon group -->
  <g transform="translate(300,210)" stroke-linecap="round" stroke-linejoin="round">
    
    <rect x="-55" y="-85" width="110" height="140" rx="6" fill="none" stroke="#1A5EAB" stroke-width="5"/>
    <line x1="-35" y1="-55" x2="35" y2="-55" stroke="#1A5EAB" stroke-width="4"/>
    <line x1="-35" y1="-20" x2="35" y2="-20" stroke="#1A5EAB" stroke-width="4"/>
    <line x1="-35" y1="15" x2="35" y2="15" stroke="#1A5EAB" stroke-width="4"/>
    <rect x="-40" y="-90" width="80" height="12" rx="3" fill="#E8F4FD" stroke="#1A5EAB" stroke-width="3"/>
    
  </g>
  <!-- Label -->
  <text x="300" y="400" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#1A5EAB" letter-spacing="1">HOSPITAL FURNITURE</text>
  <!-- Code badge -->
  <rect x="480" y="20" width="70" height="28" rx="5" fill="#1A5EAB" opacity="0.12"/>
  <text x="515" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#1A5EAB" letter-spacing="2">FUR</text>
  <!-- Bottom bar -->
  <rect x="0" y="460" width="600" height="20" fill="#1A5EAB" opacity="0.08"/>
</svg>