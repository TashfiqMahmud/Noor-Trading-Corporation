<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-WHL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EAF3FB"/>
      <stop offset="100%" style="stop-color:#F7FBFF"/>
    </linearGradient>
    <pattern id="grid-WHL" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#C8DFF5" stroke-width="0.5" opacity="0.6"/>
    </pattern>
  </defs>
  <rect width="600" height="480" fill="url(#bg-WHL)"/>
  <rect width="600" height="480" fill="url(#grid-WHL)"/>
  <!-- Corner cross accent -->
  <rect x="22" y="22" width="18" height="6" rx="3" fill="#0E9E8A" opacity="0.6"/>
  <rect x="27" y="17" width="6" height="18" rx="3" fill="#0E9E8A" opacity="0.6"/>
  <!-- Icon group -->
  <g transform="translate(300,210)" stroke-linecap="round" stroke-linejoin="round">
    
    <circle cx="0" cy="40" r="40" fill="none" stroke="#1A5EAB" stroke-width="5"/>
    <circle cx="-80" cy="40" r="20" fill="none" stroke="#1A5EAB" stroke-width="4"/>
    <path d="M -60 40 L -20 -30 L 60 -30 L 40 40" fill="none" stroke="#1A5EAB" stroke-width="5" stroke-linejoin="round"/>
    <circle cx="-5" cy="-55" r="14" fill="none" stroke="#1A5EAB" stroke-width="4"/>
    <line x1="-5" y1="-41" x2="-5" y2="-30" stroke="#1A5EAB" stroke-width="4"/>
    
  </g>
  <!-- Label -->
  <text x="300" y="400" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="20" font-weight="700" fill="#1A5EAB" letter-spacing="1">WHEELCHAIRS</text>
  <!-- Code badge -->
  <rect x="480" y="20" width="70" height="28" rx="5" fill="#1A5EAB" opacity="0.12"/>
  <text x="515" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" font-weight="700" fill="#1A5EAB" letter-spacing="2">WHL</text>
  <!-- Bottom bar -->
  <rect x="0" y="460" width="600" height="20" fill="#1A5EAB" opacity="0.08"/>
</svg>